name: "Pull Request Test"

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash --noprofile --norc -euo pipefail {0}

env:
  USERNAME: ${{ github.repository_owner }}
  FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  VCPKG_BINARY_SOURCES: "clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite"
  VCPKG_FEATURE_FLAGS: "manifests,registries,binarycaching"
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  CTEST_PARALLEL_LEVEL: 4
  CTEST_OUTPUT_ON_FAILURE: 1

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: .pre-commit-config.yaml

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install clang-format (Linux static binary)
        run: |
          sudo wget -qO /usr/local/bin/clang-format https://github.com/cpp-linter/clang-tools-static-binaries/releases/latest/download/clang-format-20_linux-amd64
          sudo chmod a+x /usr/local/bin/clang-format
          clang-format --version

      - id: file_changes
        uses: tj-actions/changed-files@v46

      - name: Run pre-commit (changed files)
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --color always --files ${{ steps.file_changes.outputs.all_changed_files }}

  build-test:
    name: Build & Test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    if: ${{ github.event.pull_request.draft == false }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        python-version: ["3.9", "3.10", "3.11"]
    permissions:
      contents: read
      packages: write
      actions: read
      security-events: write
    steps:
      - name: Checkout fp32-fsw-ximera
        uses: actions/checkout@v4

      - name: Checkout Basilisk core
        uses: actions/checkout@v4
        with:
          repository: lasp/basilisk
          path: basilisk

      - name: Add Release overlay preset for Basilisk base
        working-directory: basilisk/src
        run: |
          python <<'PY'
          import json
          from pathlib import Path

          preset_name = "base"
          overlay_name = "base-release"

          src_path = Path("CMakePresets.json")
          if not src_path.exists():
            raise SystemExit("CMakePresets.json not found in basilisk/src")

          with src_path.open("r", encoding="utf-8") as fh:
            data = json.load(fh)

          names = {p["name"] for p in data.get("configurePresets", [])}
          if preset_name not in names:
            raise SystemExit(f"Preset '{preset_name}' not present in CMakePresets.json")

          user_path = Path("CMakeUserPresets.json")
          if user_path.exists():
            with user_path.open("r", encoding="utf-8") as fh:
              user_data = json.load(fh)
          else:
            user_data = {"version": data.get("version", 5)}

          user_cfg = user_data.setdefault("configurePresets", [])
          user_cfg = [p for p in user_cfg if p.get("name") != overlay_name]
          user_cfg.append({
              "name": overlay_name,
              "inherits": preset_name,
              "cacheVariables": {
                  "CMAKE_BUILD_TYPE": "Release"
              }
          })
          user_data["configurePresets"] = user_cfg

          user_build = user_data.setdefault("buildPresets", [])
          user_build = [p for p in user_build if p.get("name") != overlay_name]
          user_build.append({
              "name": overlay_name,
              "configurePreset": overlay_name
          })
          user_data["buildPresets"] = user_build

          with user_path.open("w", encoding="utf-8") as fh:
            json.dump(user_data, fh, indent=2)
            fh.write("\n")
          PY

      - name: Set up Python ${{ matrix.python-version }}
        id: setup-py
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            basilisk/**/requirements.txt
            basilisk/**/pyproject.toml
            **/requirements.txt
            **/pyproject.toml
            **/requirements*.txt

      # NEW: Pin the exact interpreter path for this matrix leg
      - name: Pin matrix Python interpreter
        run: |
          PY="$(python -c 'import sys; print(sys.executable)')"
          echo "PYTHON_EXE=$PY" >> "$GITHUB_ENV"
          echo "Pinned Python: $PY"
          "$PY" -V

      # ---- System toolchains + GCC 13 (Linux only) ----
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build build-essential \
            pkg-config autoconf automake libtool \
            zip unzip \
            bison swig \
            libdrm-dev \
            libx11-dev libxkbcommon-x11-dev libx11-xcb-dev \
            libxft-dev libxext-dev libgles2-mesa-dev \
            libxi-dev libxtst-dev libxrandr-dev libltdl-dev \
            libgtk2.0-dev \
            python3-setuptools python3-jinja2 python3-tk \
            mono-complete \
            ccache \
            gcc-13 g++-13
          ccache --version
          ninja --version

      - name: Select GCC 13 (Linux only)
        if: runner.os == 'Linux'
        run: |
          echo "CC=gcc-13"  >> "$GITHUB_ENV"
          echo "CXX=g++-13" >> "$GITHUB_ENV"
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache"   >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
          gcc-13 -dumpfullversion
          g++-13 -dumpfullversion

      # Ensure a consistent Ninja on Linux and force generator + make program
      - name: Normalize Ninja on Linux
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get install -y ninja-build
          echo "Before:"
          which -a ninja || true
          ls -l /usr/bin/ninja || true
          ls -l /usr/local/bin/ninja || true
          if [[ -x /usr/local/bin/ninja && "$(readlink -f /usr/local/bin/ninja || echo '')" != "/usr/bin/ninja" ]]; then
            echo "Removing shadowing /usr/local/bin/ninja"
            sudo rm -f /usr/local/bin/ninja
          fi
          echo "/usr/bin" >> "$GITHUB_PATH"
          echo "CMAKE_GENERATOR=Ninja"              >> "$GITHUB_ENV"
          echo "CMAKE_MAKE_PROGRAM=/usr/bin/ninja"  >> "$GITHUB_ENV"
          echo "NINJA_STATUS=[%f/%t %o/sec] "       >> "$GITHUB_ENV"
          echo "After:"
          command -v ninja
          ninja --version

      # ---- System toolchains (macOS uses AppleClang) ----
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_ANALYTICS: 1
        run: |
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          brew install ninja swig pkg-config mono ccache
          which ninja && ninja --version
          which cmake && cmake --version
          xcrun --show-sdk-path
          clang --version
          clang++ --version
          ccache --version

      # Optional: print what CMake will see before vcpkg/cmake configure
      - name: Toolchain sanity check
        run: |
          echo "RUNNER_OS=${RUNNER_OS}"
          echo "CC=${CC:-(default)}"
          echo "CXX=${CXX:-(default)}"
          echo "CMAKE_GENERATOR=${CMAKE_GENERATOR:-(default)}"
          echo "CMAKE_MAKE_PROGRAM=${CMAKE_MAKE_PROGRAM:-(default)}"
          echo "PYTHON_EXE=${PYTHON_EXE:-(unset)}"
          which python && python -V
          "$PYTHON_EXE" -V
          which gcc-13  && gcc-13 -dumpfullversion || true
          which g++-13  && g++-13 -dumpfullversion || true
          which ninja   && ninja --version   || true

      # -------- ccache: configure + restore cache --------
      - name: Configure ccache
        run: |
          echo "CCACHE_DIR=$HOME/.ccache" >> "$GITHUB_ENV"
          echo "CCACHE_COMPRESS=1"        >> "$GITHUB_ENV"
          echo "CCACHE_MAXSIZE=1G"        >> "$GITHUB_ENV"
          echo "CCACHE_BASEDIR=$GITHUB_WORKSPACE" >> "$GITHUB_ENV"
          mkdir -p "$HOME/.ccache"
          ccache --set-config=verbose=true || true
          ccache --zero-stats || true

      - name: Compute ccache key suffix
        id: ccache_keys
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            ver="$(gcc-13 -dumpfullversion || gcc -dumpfullversion || echo unknown)"
            echo "suffix=linux-gcc-${ver}" >> "$GITHUB_OUTPUT"
          else
            ver="$(clang --version | head -n1 | sed 's/ /-/g')"
            echo "suffix=macos-${ver}" >> "$GITHUB_OUTPUT"
          fi
          echo "suffix=${suffix:-unset}"

      - name: Restore ccache cache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ steps.ccache_keys.outputs.suffix }}-${{ hashFiles('basilisk/src/vcpkg.json', 'basilisk/src/vcpkg-configuration.json') }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ steps.ccache_keys.outputs.suffix }}-
            ccache-${{ runner.os }}-

      # -----------------------------------------------

      - name: Enable ccache for CMake
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache"   >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Setup CMake 3.25.2
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.25.2'

      # vcpkg uses the same generator/make program and policy workaround
      - name: Install vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/b/vcpkg
          vcpkgJsonGlob: "basilisk/src/vcpkg.json"
          vcpkgConfigurationJsonGlob: "basilisk/src/vcpkg-configuration.json"
        env:
          VCPKG_KEEP_ENV_VARS: CC;CXX;CMAKE_GENERATOR;CMAKE_MAKE_PROGRAM;NINJA_STATUS
          VCPKG_MAX_CONCURRENCY: "1"
          CMAKE_GENERATOR: Ninja
          CMAKE_MAKE_PROGRAM: /usr/bin/ninja
          VCPKG_CMAKE_CONFIGURE_OPTIONS: "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"

      - name: Cache vcpkg build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/b/vcpkg/installed
            ${{ github.workspace }}/b/vcpkg/packages
            ${{ github.workspace }}/b/vcpkg/buildtrees
          key: vcpkg-${{ runner.os }}-${{ hashFiles('basilisk/src/vcpkg.json', 'basilisk/src/vcpkg-configuration.json') }}

      - name: Add NuGet sources for vcpkg binary cache (portable)
        env:
          VCPKG_EXE: ${{ github.workspace }}/b/vcpkg/vcpkg
        run: |
          set -euo pipefail
          NUGET="$(${VCPKG_EXE} fetch nuget | tail -n 1)"
          if [[ "$NUGET" == *.exe ]]; then
            NUGET_CMD=(mono "$NUGET")
          else
            NUGET_CMD=("$NUGET")
          fi
          echo "Using NuGet CLI: ${NUGET_CMD[*]}"
          "${NUGET_CMD[@]}" sources add \
            -Source "${FEED_URL}" \
            -StorePasswordInClearText \
            -Name GitHubPackages \
            -UserName "${USERNAME}" \
            -Password "${{ secrets.GITHUB_TOKEN }}"
          "${NUGET_CMD[@]}" setapikey "${{ secrets.GITHUB_TOKEN }}" -Source "${FEED_URL}"

      - name: Create virtual environment
        run: |
          # Use the pinned matrix interpreter for this venv
          "$PYTHON_EXE" -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -V
          pip -V

      - name: Install Python deps (from basilisk into fp32-fsw-ximera venv)
        run: |
          if [[ -f "$GITHUB_WORKSPACE/basilisk/requirements.txt" ]]; then
            ./.venv/bin/python -m pip install -r "$GITHUB_WORKSPACE/basilisk/requirements.txt"
          fi
          ./.venv/bin/python -m pip install --upgrade gcovr
          ./.venv/bin/python -m pip list

      - name: Configure Basilisk (with external modules)
        working-directory: basilisk/src
        env:
          VCPKG_BINARY_SOURCES: "clear;nuget,${{ env.FEED_URL }},readwrite"
        run: |
          args=(
            --preset base-release
            "-DEXTERNAL_MODULES_PATH=${GITHUB_WORKSPACE}/algorithms"
          )
          if [[ "${{ runner.os }}" == "Linux" && "${{ matrix.python-version }}" == "3.11" ]]; then
            args+=(
              "-DCMAKE_BUILD_TYPE=Debug"
              "-DCMAKE_C_FLAGS=--coverage"
              "-DCMAKE_CXX_FLAGS=--coverage"
              "-DCMAKE_EXE_LINKER_FLAGS=--coverage"
              "-DCMAKE_SHARED_LINKER_FLAGS=--coverage"
            )
          fi
          cmake "${args[@]}"

      - name: Build Basilisk + modules
        working-directory: basilisk/src
        run: cmake --build --preset base-release --parallel

      - name: Install Basilisk (editable)
        run: |
          source .venv/bin/activate
          python -m pip install -e basilisk

      - name: Install fp32-fsw-ximera (editable, if package)
        run: |
          source .venv/bin/activate
          if [[ -f pyproject.toml || -f setup.py ]]; then python -m pip install -e .; fi

      - name: Run fp32-fsw-ximera tests
        run: |
          source .venv/bin/activate
          mkdir -p junit coverage
          cd algorithms
          pytest -n auto \
            --junitxml="../junit/test-results-${{ matrix.python-version }}.xml"
          cd ..

      - name: Generate external module coverage (Linux / py3.11 only)
        if: ${{ runner.os == 'Linux' && matrix.python-version == '3.11' }}
        run: |
          source .venv/bin/activate
          mkdir -p coverage
          GCOV_BIN="$(command -v gcov-13 || command -v gcov)"
          echo "Using gcov executable: ${GCOV_BIN}"
          common_args=(
            --root "${GITHUB_WORKSPACE}/algorithms"
            --filter "${GITHUB_WORKSPACE}/algorithms"
            --object-directory "${GITHUB_WORKSPACE}/basilisk/dist3"
            --exclude ".*_tests/.*"
            --gcov-executable "${GCOV_BIN}"
            --gcov-ignore-errors no_working_dir_found
            --gcov-ignore-errors source_not_found
          )
          gcovr "${common_args[@]}" \
            --xml-pretty \
            --output coverage/external-modules-coverage.xml
          gcovr "${common_args[@]}" \
            --html-details \
            --output coverage/external-modules-coverage.html
          gcovr "${common_args[@]}" \
            --txt \
            --output coverage/external-modules-coverage.txt
          gcovr "${common_args[@]}" \
            --json \
            --output coverage/external-modules-coverage.json
          {
            echo '### External Modules Coverage (gcovr)';
            echo;
            echo '```text';
            cat coverage/external-modules-coverage.txt;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Detect changed source files (Linux / py3.11 only)
        id: changed_ext_modules
        if: ${{ runner.os == 'Linux' && matrix.python-version == '3.11' }}
        uses: tj-actions/changed-files@v46
        with:
          files: |
            algorithms/**/*.c
            algorithms/**/*.cc
            algorithms/**/*.cxx
            algorithms/**/*.cpp

      - name: Enforce coverage threshold on touched files (Linux / py3.11 only)
        if: ${{ runner.os == 'Linux' && matrix.python-version == '3.11' }}
        env:
          COVERAGE_THRESHOLD: '0.8'
          CHANGED_FILES: ${{ steps.changed_ext_modules.outputs.all_changed_files }}
        run: |
          source .venv/bin/activate
          python <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          threshold = float(os.environ.get("COVERAGE_THRESHOLD", "0.8")) * 100.0

          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          def append_summary(lines):
              if not summary_path:
                  return
              with open(summary_path, "a", encoding="utf-8") as fh:
                  fh.write("\n".join(lines) + "\n")

          append_summary(["### Coverage Threshold Check", ""])

          touched_raw = os.environ.get("CHANGED_FILES", "").strip()
          touched = [
              line.strip().replace("\\", "/")
              for line in touched_raw.splitlines()
              if line.strip()
          ]

          tracked_suffixes = (".c", ".cc", ".cxx", ".cpp")
          touched_sources = [
              path for path in touched
              if path.startswith("algorithms/") and path.endswith(tracked_suffixes)
          ]

          if not touched_sources:
              msg = "No touched source files under algorithms/; skipping coverage gate."
              print(msg)
              append_summary([msg, ""])
              sys.exit(0)

          coverage_path = workspace / "coverage" / "external-modules-coverage.json"
          if not coverage_path.exists():
              msg = f"Coverage report '{coverage_path}' not found; cannot enforce threshold."
              print(msg)
              append_summary([msg, ""])
              sys.exit(0)

          with coverage_path.open("r", encoding="utf-8") as fh:
              data = json.load(fh)

          file_entries = {}
          for entry in data.get("files", []):
              raw = entry.get("file", "")
              if not raw:
                  continue
              path = Path(raw)
              candidates = set()
              candidates.add(path.as_posix())
              try:
                  candidates.add(path.resolve().relative_to(workspace).as_posix())
              except Exception:
                  try:
                      candidates.add(path.resolve().as_posix())
                  except Exception:
                      pass
              if not path.is_absolute():
                  candidates.add((workspace / path).resolve().relative_to(workspace).as_posix())
              for candidate in candidates:
                  file_entries[candidate] = entry

          def percent(entry):
              lines = entry.get("lines", {}) if isinstance(entry, dict) else {}
              total = lines.get("count") or lines.get("total") or 0
              covered = lines.get("covered") or 0
              pct = lines.get("percent")
              if pct is None:
                  rate = lines.get("rate") or lines.get("line_rate")
                  if rate is not None:
                      pct = float(rate) * 100.0
              if pct is not None:
                  return float(pct)
              if total == 0:
                  return 100.0
              return (covered / total) * 100.0

          report_lines = ["| File | Line % |", "| --- | ---: |"]
          failures = []
          for rel in touched_sources:
              key = rel
              entry = file_entries.get(key)
              if entry is None:
                  abs_candidates = [
                      Path(rel).resolve().as_posix(),
                      (workspace / rel).resolve().as_posix(),
                  ]
                  for candidate in abs_candidates:
                      entry = file_entries.get(candidate)
                      if entry:
                          break

              pct = percent(entry) if entry else 0.0
              report_lines.append(f"| {rel} | {pct:.2f}% |")
              if pct + 1e-9 < threshold:
                  failures.append((rel, pct))

          print("\n".join(report_lines))
          append_summary(report_lines + [""])

          if failures:
              fail_lines = [
                  "Touched files below threshold ({}%):".format(threshold),
              ] + [
                  f"- {rel}: {pct:.2f}%"
                  for rel, pct in failures
              ]
              print("\n".join(fail_lines))
              append_summary(fail_lines + [""])
              sys.exit(1)

          success_msg = "All touched files meet the {:.0f}% coverage threshold.".format(threshold)
          print(success_msg)
          append_summary([success_msg, ""])
          PY

      - name: Upload coverage artifacts (Linux / py3.11 only)
        if: ${{ runner.os == 'Linux' && matrix.python-version == '3.11' }}
        uses: actions/upload-artifact@v4
        with:
          name: external-modules-coverage
          path: |
            coverage/external-modules-coverage.xml
            coverage/external-modules-coverage.html
            coverage/external-modules-coverage.txt
            coverage/external-modules-coverage.json
          retention-days: 14

      - name: Upload pytest test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.os }}-py${{ matrix.python-version }}
          path: junit/test-results-${{ matrix.python-version }}.xml
          retention-days: 7

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats || true
